document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  font-display: swap;\n  src: url(\"18b35b0c-fdfe-4f92-b8c7-0cfba0b28981\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6f3f4626-933d-4cfd-aea8-6d7e0ad9794b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --bg: #faf5ef;\n    --bg-warm: #f3e9dc;\n    --bg-deep: #e8d8c2;\n    --paper: #ffffff;\n    --ink: #2a221d;\n    --ink-soft: #5d4f43;\n    --ink-mute: #8c7e6f;\n    --line: #e0d2bd;\n    --line-soft: #ebdfcc;\n    --accent: #c95d3f;          /* terracota viva */\n    --accent-deep: #9c4127;\n    --accent-soft: #f5d8c8;\n    --cream: #f9ecdc;\n    --gold: #c08a3e;\n    --serif: 'Fraunces', 'Iowan Old Style', Georgia, serif;\n    --sans: 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n    --maxw: 1200px;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: var(--sans);\n    background: var(--bg);\n    color: var(--ink);\n    font-size: 17px;\n    line-height: 1.6;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  ::selection { background: var(--accent); color: #fff; }\n\n  h1, h2, h3, h4 {\n    font-family: var(--serif);\n    font-weight: 500;\n    margin: 0;\n    text-wrap: balance;\n    letter-spacing: -0.015em;\n  }\n  h1 { font-size: clamp(2.6rem, 6vw, 5rem); line-height: 1; letter-spacing: -0.03em; }\n  h2 { font-size: clamp(2rem, 4.2vw, 3.4rem); line-height: 1.05; letter-spacing: -0.02em; }\n  h3 { font-size: clamp(1.3rem, 1.9vw, 1.65rem); line-height: 1.2; }\n  p { margin: 0 0 1em; text-wrap: pretty; }\n  em { font-style: italic; }\n\n  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }\n  .wrap-tight { max-width: 880px; margin: 0 auto; padding: 0 28px; }\n  section { padding: clamp(72px, 9vw, 130px) 0; position: relative; }\n  .center { text-align: center; }\n\n  /* =============== COUNTDOWN BAR =============== */\n  .countdown-bar {\n    background: var(--ink);\n    color: #fff;\n    padding: 12px 24px;\n    text-align: center;\n    font-size: 0.92rem;\n    position: sticky;\n    top: 0;\n    z-index: 100;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 22px;\n    flex-wrap: wrap;\n  }\n  .countdown-bar .label {\n    text-transform: uppercase;\n    font-size: 0.72rem;\n    letter-spacing: 0.18em;\n    color: var(--accent-soft);\n  }\n  .countdown-clock {\n    display: flex;\n    gap: 8px;\n    font-family: var(--serif);\n  }\n  .countdown-clock .unit {\n    background: rgba(255,255,255,0.08);\n    border: 1px solid rgba(255,255,255,0.18);\n    padding: 6px 10px;\n    border-radius: 4px;\n    min-width: 50px;\n    text-align: center;\n    line-height: 1;\n  }\n  .countdown-clock .num { font-size: 1.15rem; font-weight: 600; }\n  .countdown-clock .lbl { font-family: var(--sans); font-size: 0.6rem; opacity: 0.65; margin-top: 3px; letter-spacing: 0.1em; text-transform: uppercase; }\n  .countdown-bar .cta-mini {\n    background: var(--accent);\n    color: #fff;\n    padding: 9px 18px;\n    border-radius: 999px;\n    text-decoration: none;\n    font-weight: 600;\n    font-size: 0.85rem;\n    letter-spacing: 0.02em;\n    transition: background .25s;\n  }\n  .countdown-bar .cta-mini:hover { background: var(--accent-deep); }\n\n  /* =============== HERO =============== */\n  .hero {\n    padding: clamp(60px, 8vw, 110px) 0 clamp(50px, 6vw, 90px);\n    background: radial-gradient(1200px 600px at 50% 0%, var(--cream), transparent 70%), var(--bg);\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n  }\n  .hero::before, .hero::after {\n    content: \"\";\n    position: absolute;\n    border-radius: 50%;\n    pointer-events: none;\n  }\n  .hero::before {\n    top: 8%; left: 6%; width: 280px; height: 280px;\n    background: radial-gradient(circle, var(--accent-soft), transparent 70%);\n    opacity: 0.7;\n  }\n  .hero::after {\n    bottom: -10%; right: 4%; width: 360px; height: 360px;\n    background: radial-gradient(circle, var(--bg-deep), transparent 70%);\n    opacity: 0.8;\n  }\n  .hero-content { position: relative; z-index: 1; }\n\n  .brand-logo {\n    display: inline-flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 6px;\n    margin-bottom: 36px;\n  }\n  .brand-logo .mark {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 2.2rem;\n    color: var(--accent-deep);\n    line-height: 1;\n    letter-spacing: -0.02em;\n  }\n  .brand-logo .sub {\n    font-family: var(--sans);\n    font-size: 0.65rem;\n    letter-spacing: 0.32em;\n    color: var(--ink-mute);\n    text-transform: uppercase;\n  }\n\n  .hero h1 .accent {\n    font-style: italic;\n    font-weight: 400;\n    color: var(--accent-deep);\n  }\n  .hero-sub {\n    font-size: 1.2rem;\n    color: var(--ink-soft);\n    max-width: 52ch;\n    margin: 32px auto 40px;\n    line-height: 1.55;\n  }\n  .hero-icons {\n    display: flex;\n    justify-content: center;\n    gap: 38px;\n    margin: 38px 0 30px;\n    flex-wrap: wrap;\n  }\n  .hero-icons .ico {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n    font-size: 0.78rem;\n    color: var(--ink-soft);\n    letter-spacing: 0.02em;\n  }\n  .hero-icons .glyph {\n    width: 52px; height: 52px;\n    border-radius: 50%;\n    background: var(--paper);\n    border: 1px solid var(--line);\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 1.5rem;\n    color: var(--accent-deep);\n  }\n\n  .btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    background: var(--accent);\n    color: #fff;\n    padding: 20px 38px;\n    border-radius: 999px;\n    font-weight: 600;\n    font-size: 1rem;\n    text-decoration: none;\n    border: none;\n    cursor: pointer;\n    transition: all .3s ease;\n    box-shadow: 0 8px 24px -8px rgba(201, 93, 63, 0.4);\n    letter-spacing: 0.01em;\n  }\n  .btn:hover { background: var(--accent-deep); transform: translateY(-2px); box-shadow: 0 12px 28px -8px rgba(201, 93, 63, 0.55); }\n  .btn .arr { transition: transform .3s; }\n  .btn:hover .arr { transform: translateX(4px); }\n\n  .btn-outline {\n    background: transparent;\n    color: var(--ink);\n    border: 1.5px solid var(--ink);\n    box-shadow: none;\n  }\n  .btn-outline:hover { background: var(--ink); color: #fff; }\n\n  /* =============== BENEFITS GRID =============== */\n  .benefits {\n    background: var(--bg-warm);\n    padding: clamp(80px, 9vw, 120px) 0;\n  }\n  .benefits .label {\n    font-size: 0.72rem;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--accent-deep);\n    text-align: center;\n    margin-bottom: 14px;\n  }\n  .benefits h2 {\n    text-align: center;\n    margin-bottom: 56px;\n    max-width: 24ch;\n    margin-left: auto;\n    margin-right: auto;\n  }\n  .benefits h2 em { color: var(--accent-deep); }\n\n  .benefits-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 20px;\n  }\n  .benefit-card {\n    background: var(--paper);\n    border-radius: 18px;\n    padding: 36px 28px;\n    text-align: center;\n    border: 1px solid var(--line-soft);\n    transition: transform .3s, box-shadow .3s;\n  }\n  .benefit-card:hover { transform: translateY(-4px); box-shadow: 0 14px 30px -10px rgba(154, 65, 39, 0.18); }\n  .benefit-card .icon {\n    width: 64px; height: 64px;\n    border-radius: 50%;\ undo, sabe que isso não tá certo, mas não sabe como mudar sem virar a casa de cabeça pra baixo.<\u002Fp>\n\n    <p style=\"font-family: var(--serif); font-style: italic; font-size: 1.25rem; color: var(--accent-deep); margin: 0 auto 38px; max-width: 36ch;\">É aqui que o Telas em Equilíbrio começa.<\u002Fp>\n\n    <a href=\"#oferta\" class=\"btn\">GARANTIR MEU ACESSO AO CURSO <span class=\"arr\">→<\u002Fspan><\u002Fa>\n\n    <div style=\"margin-top: 26px; font-size: 0.82rem; letter-spacing: 0.06em; color: var(--ink-mute);\">6 módulos · 2 bônus exclusivos · 12 meses de acesso · 7 dias de garantia<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- O QUE ESTÁ ACONTECENDO -->\n<section class=\"pain-block\">\n  <div class=\"wrap\">\n    <div class=\"label\">O QUE ESTÁ ACONTECENDO NA SUA CASA<\u002Fdiv>\n    <h2>A tela virou a única coisa <em>que funciona<\u002Fem><\u002Fh2>\n    <p class=\"intro\">Pro jantar sair sem choro. Pra criança ficar quieta no carro. Pra você conseguir fazer uma ligação de 10 minutos.<\u002Fp>\n    <p class=\"intro\">Você sabe que não é o ideal. Só que tirar cria uma crise que você não tem energia pra enfrentar. E colocar de volta é mais rápido do que aguentar o choro.<\u002Fp>\n    <p class=\"intro last\">Esse é o ciclo. E ele não se resolve com força de vontade.<\u002Fp>\n\n    <div class=\"pain-cards\">\n      <div class=\"pain-card\"><div class=\"pc-num\">01<\u002Fdiv><p>Filho que só fica calmo com tela na mão<\u002Fp><\u002Fdiv>\n      <div class=\"pain-card\"><div class=\"pc-num\">02<\u002Fdiv><p>Crise quando o tablet desliga<\u002Fp><\u002Fdiv>\n      <div class=\"pain-card\"><div class=\"pc-num\">03<\u002Fdiv><p>Criança que não sabe brincar sozinha<\u002Fp><\u002Fdiv>\n      <div class=\"pain-card\"><div class=\"pc-num\">04<\u002Fdiv><p>Tela na refeição pra comida descer<\u002Fp><\u002Fdiv>\n      <div class=\"pain-card\"><div class=\"pc-num\">05<\u002Fdiv><p>Saída de casa que depende do celular<\u002Fp><\u002Fdiv>\n      <div class=\"pain-card\"><div class=\"pc-num\">06<\u002Fdiv><p>Culpa que acompanha cada vez que você cede<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- O QUE O CURSO NÃO É -->\n<section class=\"nots\">\n  <div class=\"wrap\">\n    <div class=\"label\">O QUE O CURSO NÃO É<\u002Fdiv>\n    <h2>Esse curso não pede que você <em>proíba telas<\u002Fem><\u002Fh2>\n    <p class=\"intro\">Tecnologia faz parte da vida. Fingir que não é ingênuo e na prática não funciona.<\u002Fp>\n    <p class=\"intro\">O que o curso ensina é como criar uma rotina onde a tela tem lugar, tem hora e tem limite, sem que o fim do tempo de tela vire um campo de batalha.<\u002Fp>\n\n    <div class=\"quote\">\"A tela entretém. A interação real é que constrói desenvolvimento.\"<\u002Fdiv>\n    <p class=\"quote-sub\">Quando a vida real fica interessante, a tela perde força sozinha.<\u002Fp>\n\n    <div class=\"nots-grid\">\n      <div class=\"not-card\">\n        <div class=\"nc-tag\">SEM RADICALISMO<\u002Fdiv>\n        <p>Proibir tela total não funciona e não é o objetivo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"not-card\">\n        <div class=\"nc-tag\">SEM CULPA<\u002Fdiv>\n        <p>Você não falhou. Você nunca teve um plano de transição.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"not-card\">\n        <div class=\"nc-tag\">COM MÉTODO<\u002Fdiv>\n        <p>Limites reais, rotina possível, criança que aprende a esperar.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INSIDE THE COURSE -->\n<section>\n  <div class=\"wrap\">\n    <div class=\"inside\">\n      <div class=\"inside-visual\">\n        <div class=\"floater f1\"><span class=\"dot\"><\u002Fspan> Módulo 02 · Desmame digital<\u002Fdiv>\n        <div class=\"floater f2\"><span class=\"dot\"><\u002Fspan> + Lista de brincadeiras<\u002Fdiv>\n        <div class=\"label-tag\">prévia · plataforma do curso<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"label\">POR DENTRO DO CURSO<\u002Fdiv>\n        <h2>Não é palpite. <em>É consultório.<\u002Fem><\u002Fh2>\n        <p>Sou Carine Rech. Pediatra e neonatologista, atendo crianças há mais de 10 anos. Vejo toda semana no consultório o que o excesso de tela faz no sono, na atenção, no comportamento e no vínculo familiar.<\u002Fp>\n        <p>Sou mãe também. Já entreguei o tablet pro meu filho tomar banho mais rápido. Não tô julgando ninguém.<\u002Fp>\n        <p>O que tenho é um <strong>método<\u002Fstrong>. Esse curso é a versão organizada do que eu falo no consultório e faço em casa. Sem fórmula perfeita. Com decisões reais.<\u002Fp>\n        <div style=\"margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--line); font-size: 0.82rem; letter-spacing: 0.04em; color: var(--ink-mute);\">10+ anos em pediatria · CRM-RS 39433 · RQE 35350/35351 · Pediatria · Neonatologia<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- UPDATES -->\n<section>\n  <div class=\"updates\">\n    <div class=\"label\">ENTREI, E AGORA?<\u002Fdiv>\n    <h2>Você não estará mais sozinha <em>depois da matrícula<\u002Fem><\u002Fh2>\n    <p>\n      Toda semana entra conteúdo novo, lives com especialistas, aulas curtas, chat de tira dúvidas, acesso ao grupo de mães, casos que eu vejo no consultório e que valem virar aula e muitos outros conteúdos. \nVocê não recebe um curso pronto e some.\n    <\u002Fp>\n    <div class=\"highlight\">A gente segue junto pelos próximos 12 meses<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TRILHA -->\n<section class=\"trilha\">\n  <div class=\"wrap\">\n    <div class=\"head\">\n      <div class=\"label\">O QUE VOCÊ VAI APRENDER<\u002Fdiv>\n      <h2>Seis módulos pra uma rotina que <em>não depende de tela<\u002Fem><\u002Fh2>\n      <div class=\"hint\">Arrasta pro lado<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"wrap\">\n    <div class=\"carousel\">\n      <div class=\"carousel-track\">\n        <article class=\"course-card\">\n
